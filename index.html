
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dartboard Score Calculator</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      overflow-x: hidden;
    }

    button:hover {
      opacity: 0.9;
    }

    .app {
      min-height: 100vh;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .board-card {
      width: 100%;
      max-width: 900px;
      background: white;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .board-title {
      margin-top: 0;
      text-align: center;
    }

    .board-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .dartboard {
      width: min(92vw, 700px);
      height: min(92vw, 700px);
      max-width: 100%;
      object-fit: contain;
      border-radius: 50%;
      cursor: crosshair;
      user-select: none;
      touch-action: manipulation;
    }

    .last-hit {
      text-align: center;
      margin-top: 20px;
      margin-bottom: 0;
    }

    .score-panel {
      width: 100%;
      max-width: 900px;
      margin-top: 20px;
      background: white;
      padding: 20px;
      border-radius: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .score-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .reset-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 12px;
      background: #ef4444;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .throw-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .throw-card {
      background: #f3f4f6;
      padding: 14px;
      border-radius: 14px;
    }

    @media (max-width: 600px) {
      .board-card,
      .score-panel {
        padding: 16px;
        border-radius: 18px;
      }

      .board-title {
        font-size: 28px;
      }

      .last-hit {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function DartboardScoreCalculator() {

      // Standard dartboard order clockwise from top
      const numbers = [
        20, 1, 18, 4, 13,
        6, 10, 15, 2, 17,
        3, 19, 7, 16, 8,
        11, 14, 9, 12, 5
      ];

      const [throws, setThrows] = useState([]);
      const [lastHit, setLastHit] = useState(
        "Click the dartboard to score"
      );

      // Responsive board size
      const center = boardSize / 2;

      // Radii scaled relative to board image
      const scale = boardSize / 563;

      const radii = {
        bullInner: 8 * scale,
        bullOuter: 21 * scale,
        tripleInner: 121 * scale,
        tripleOuter: 134 * scale,
        doubleInner: 201 * scale,
        doubleOuter: 214 * scale,
        outer: 281.5 * scale
      };

      const totalScore = throws.reduce(
        (sum, t) => sum + t.score,
        0
      );

      const handleBoardClick = (e) => {

        const rect =
          e.currentTarget.getBoundingClientRect();

        // Mouse/touch position inside image
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        // Coordinates relative to center
        const dx = x - center;
        const dy = center - y;

        // Distance from center
        const distance = Math.sqrt(
          dx * dx + dy * dy
        );

        // Outside board
        if (distance > radii.outer) {
          setLastHit("Missed board");
          return;
        }

        // Angle calculation
        let angle =
          Math.atan2(dx, dy) *
          (180 / Math.PI);

        if (angle < 0) {
          angle += 360;
        }

        // Shift by half segment
        angle = (angle + 9) % 360;

        const segmentIndex =
          Math.floor(angle / 18);

        const baseValue =
          numbers[segmentIndex];

        let multiplier = 1;
        let score = baseValue;
        let label = `${baseValue}`;

        // Bulls
        if (distance <= radii.bullInner) {

          score = 50;
          label = "Bullseye (50)";

        } else if (
          distance <= radii.bullOuter
        ) {

          score = 25;
          label = "Outer Bull (25)";

        } else {

          // Triple ring
          if (
            distance >= radii.tripleInner &&
            distance <= radii.tripleOuter
          ) {
            multiplier = 3;
          }

          // Double ring
          if (
            distance >= radii.doubleInner &&
            distance <= radii.doubleOuter
          ) {
            multiplier = 2;
          }

          score = baseValue * multiplier;

          if (multiplier === 2) {
            label =
              `Double ${baseValue} (${score})`;
          }

          if (multiplier === 3) {
            label =
              `Triple ${baseValue} (${score})`;
          }
        }

        const throwData = {
          score,
          label,
          timestamp: Date.now()
        };

        // Keep latest 10 throws
        setThrows(prev =>
          [throwData, ...prev].slice(0, 10)
        );

        setLastHit(label);
      };

      return (
        <div className="app">

          {/* Dartboard */}
          <div className="board-card">

            <h1 className="board-title">
              Dartboard Score Calculator
            </h1>

            <div className="board-wrapper">
              <img
                onClick={handleBoardClick}
                src="pngegg.png"
                alt="dartboard"
                className="dartboard"
              />
            </div>

            <h2 className="last-hit">
              {lastHit}
            </h2>

          </div>

          {/* Score Panel Underneath */}
          <div className="score-panel">

            <div className="score-header">
              <h2>
                Total Score: {totalScore}
              </h2>

              <button
                onClick={() => {
                  setThrows([]);
                  setLastHit(
                    "Click the dartboard to score"
                  );
                }}
                className="reset-btn"
              >
                Reset
              </button>
            </div>

            {throws.length === 0 && (
              <p>No throws yet.</p>
            )}

            <div className="throw-list">
              {throws.map((t) => (
                <div
                  key={t.timestamp}
                  className="throw-card"
                >
                  <strong>{t.label}</strong>

                  <div>
                    Score: {t.score}
                  </div>
                </div>
              ))}
            </div>

          </div>

        </div>
      );
    }

    const root =
      ReactDOM.createRoot(
        document.getElementById("root")
      );

    root.render(
      <DartboardScoreCalculator />
    );
  </script>
</body>
</html>
